<!DOCTYPE html>
<html>
<head>
  <title>Mon Chat</title>
  <style>
.sent {
  background: #d1e7dd;
  padding: 8px;
  margin: 5px;
  border-radius: 10px;
  text-align: right;
  max-width: 70%;
  margin-left: auto;
}

.bot {
  background: #f8d7da;
  padding: 8px;
  margin: 5px;
  border-radius: 10px;
  text-align: left;
  max-width: 70%;
}

</style>
  </style>
</head>

<body>


<h2>💬 Mon Chat</h2>

<!-- 👤 NOM EN HAUT -->
<input type="text" id="username" placeholder="Ton nom">

<!-- 💬 MESSAGE -->
<div id="chat"></div>

<input type="text" id="message" placeholder="Écris un message">

<button onclick="sendMessage()">Envoyer</button>
<script>
function sendMessage() {
  let msg = document.getElementById("message").value;
  let name = document.getElementById("username").value;

  if (msg.trim() !== "") {

    let chat = document.getElementById("chat");

    // 👤 message utilisateur
    let userDiv = document.createElement("div");
    userDiv.className = "sent";
    userDiv.innerText = name + ": " + msg;
    chat.appendChild(userDiv);

    document.getElementById("message").value = "";

    // 🤖 bot
    setTimeout(() => {
      let botDiv = document.createElement("div");
      botDiv.className = "bot";
      botDiv.innerText = "Bot: message reçu 👍";
      chat.appendChild(botDiv);
    }, 1000);
  }
}
</script>

</body>
</html>
